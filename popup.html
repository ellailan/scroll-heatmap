<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Heat Map</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>Scroll Heat Map</h1>
    </div>
    
    <div id="upload-section" class="section">
      <div class="upload-area">
        <input type="file" id="csv-input" accept=".csv" hidden>
        <button id="upload-btn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20ZM12 19L8 15H11V11H13V15H16L12 19Z" fill="currentColor"/>
          </svg>
          Upload CSV File
        </button>
        <p id="file-name" class="file-name"></p>
      </div>
    </div>
    
    <div id="error-message" class="error-message hidden"></div>
    
    <div id="data-preview" class="section hidden">
      <h3>Scroll Data</h3>
      <div id="scroll-stats" class="scroll-stats"></div>
    </div>
    
    <div class="section">
      <div class="toggle-container">
        <span class="toggle-label">Show Heat Map</span>
        <label class="toggle-switch">
          <input type="checkbox" id="heatmap-toggle" disabled>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    
    <div class="section info">
      <p class="info-text">Upload a CSV file with scroll depth data to visualize the heatmap on any website.</p>
      <p class="info-text small">Expected format: Event name column with "scroll_to_XX" values and Event count column.</p>
    </div>
    
    <div class="footer">
      <button id="clear-data-btn" class="btn btn-secondary btn-small">Clear Data</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
